version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: evico-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: evicoDB
      MYSQL_USER: evico
      MYSQL_PASSWORD: evico_pass
      TZ: Asia/Tokyo
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci

volumes:
  mysql-data:
